<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World for Prity</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #00d2ff; font-family: sans-serif; letter-spacing: 1px;
            font-size: 12px; pointer-events: none; opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="ui">TOUCH OR MOVE TO CONTROL THE UNIVERSE</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        let scene, camera, renderer, particleSystem;
        const particleCount = 6000;
        let particles = [];
        let mouse = { x: 0, y: 0 };
        let currentShape = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                posArray[i*3] = (Math.random() - 0.5) * 10;
                posArray[i*3+1] = (Math.random() - 0.5) * 10;
                posArray[i*3+2] = (Math.random() - 0.5) * 10;
                
                particles.push({
                    x: posArray[i*3], y: posArray[i*3+1], z: posArray[i*3+2],
                    origX: posArray[i*3], origY: posArray[i*3+1], origZ: posArray[i*3+2]
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const material = new THREE.PointsMaterial({
                size: 0.025,
                color: 0x00d2ff,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            // 5 second por por shape change hobe
            setInterval(transitionNext, 4000);
            animate();
        }

        // Shape 1: Cube
        function getCubeLayout() {
            let pts = [];
            for (let i = 0; i < particleCount; i++) {
                pts.push({
                    x: (Math.random() - 0.5) * 4,
                    y: (Math.random() - 0.5) * 4,
                    z: (Math.random() - 0.5) * 4
                });
            }
            return pts;
        }

        // Shape 2: Sphere
        function getSphereLayout() {
            let pts = [];
            for (let i = 0; i < particleCount; i++) {
                let phi = Math.acos(-1 + (2 * i) / particleCount);
                let theta = Math.sqrt(particleCount * Math.PI) * phi;
                pts.push({
                    x: 2.5 * Math.cos(theta) * Math.sin(phi),
                    y: 2.5 * Math.sin(theta) * Math.sin(phi),
                    z: 2.5 * Math.cos(phi)
                });
            }
            return pts;
        }

        // Final Shape: Name "PRITY"
        function getNameLayout(text) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 200;
            ctx.fillStyle = "white";
            ctx.font = "bold 60px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, 200, 110);
            
            let data = ctx.getImageData(0,0,400,200).data;
            let targetPoints = [];
            for(let y=0; y<200; y+=2) {
                for(let x=0; x<400; x+=2) {
                    if(data[(y*400+x)*4+3] > 128) {
                        targetPoints.push({ x: (x-200)/40, y: -(y-100)/40, z: 0 });
                    }
                }
            }
            return targetPoints;
        }

        function transitionNext() {
            let nextPoints;
            if(currentShape === 0) nextPoints = getSphereLayout();
            else if(currentShape === 1) nextPoints = getCubeLayout();
            else nextPoints = getNameLayout("PRITY");

            const pos = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                let target = nextPoints[i % nextPoints.length];
                new TWEEN.Tween(particles[i])
                    .to({ x: target.x, y: target.y, z: target.z }, 2000)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .onUpdate(() => {
                        pos[i*3] = particles[i].x;
                        pos[i*3+1] = particles[i].y;
                        pos[i*3+2] = particles[i].z;
                        particleSystem.geometry.attributes.position.needsUpdate = true;
                    })
                    .start();
            }
            currentShape = (currentShape + 1) % 3;
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            
            // Mouse/Touch Interaction
            particleSystem.rotation.y += (mouse.x * 0.5 - particleSystem.rotation.y) * 0.05;
            particleSystem.rotation.x += (mouse.y * 0.5 - particleSystem.rotation.x) * 0.05;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('touchstart', (e) => {
            mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
