<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Universe for Prity</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #00d2ff; pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
            font-size: 12px; opacity: 0.7;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">Click to start & Clap to see magic 👏</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, particles, particleSystem;
        let isForming = false;
        let msgIndex = 0;
        const messages = ["PRITY", "BESTIE", "CUTE", "FUNNY"];
        const particleCount = 5000;
        
        // ১. সিন সেটআপ
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ২. কণা (Particles) তৈরি
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                // শুরুতে একটি ৩ডি কিউব আকারে সাজানো
                positions[i * 3] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 4;

                colors[i * 3] = 0; 
                colors[i * 3 + 1] = 0.8; 
                colors[i * 3 + 2] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.02,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            animate();
        }

        // ৩. অ্যানিমেশন লুপ
        function animate() {
            requestAnimationFrame(animate);
            
            if (!isForming) {
                particleSystem.rotation.y += 0.002;
                particleSystem.rotation.x += 0.001;
            }

            renderer.render(scene, camera);
        }

        // ৪. হাত/মাউস কন্ট্রোল
        window.addEventListener('mousemove', (e) => {
            if (!isForming) {
                const x = (e.clientX / window.innerWidth) * 2 - 1;
                const y = -(e.clientY / window.innerHeight) * 2 + 1;
                particleSystem.rotation.set(y * 0.5, x * 0.5, 0);
            }
        });

        // ৫. টেক্সট তৈরি করার ম্যাজিক (তালি দিলে)
        function formText(text) {
            isForming = true;
            const canvasText = document.createElement('canvas');
            const ctx = canvasText.getContext('2d');
            canvasText.width = 200;
            canvasText.height = 100;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, 100, 60);

            const imgData = ctx.getImageData(0, 0, 200, 100).data;
            const points = [];
            for (let i = 0; i < imgData.length; i += 4) {
                if (imgData[i + 3] > 128) {
                    const x = (i / 4) % 200;
                    const y = Math.floor((i / 4) / 200);
                    points.push({ x: (x - 100) / 25, y: -(y - 50) / 25 });
                }
            }

            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const pt = points[i % points.length];
                // কণাগুলোকে টেক্সটের পজিশনে পাঠানো (অ্যানিমেশন ছাড়াই দ্রুত যাবে)
                positions[i * 3] = pt.x + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 1] = pt.y + (Math.random() - 0.5) * 0.1;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.rotation.set(0,0,0);

            setTimeout(() => {
                isForming = false;
                // ৩ সেকেন্ড পর আবার কিউব শেপে ফিরে যাবে
                resetToCube();
            }, 3000);
        }

        function resetToCube() {
            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 4;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }

        // ৬. ক্লাপ ডিটেকশন
        async function startClap() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new AudioContext();
            const analyser = audioContext.createAnalyser();
            audioContext.createMediaStreamSource(stream).connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);

            function detect() {
                analyser.getByteFrequencyData(data);
                const volume = data.reduce((a, b) => a + b) / data.length;
                if (volume > 50 && !isForming) {
                    formText(messages[msgIndex]);
                    msgIndex = (msgIndex + 1) % messages.length;
                }
                requestAnimationFrame(detect);
            }
            detect();
        }

        window.addEventListener('click', () => {
            if (typeof audioContext === 'undefined') startClap();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
