<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Controlled Universe for Prity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00d2ff; font-family: sans-serif; z-index: 10;
        }
        /* ক্যামেরা প্রিভিউ ছোট করে কোণায় থাকবে */
        #video_container { position: absolute; bottom: 10px; right: 10px; width: 150px; height: 110px; border-radius: 10px; overflow: hidden; border: 2px solid #00d2ff; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="instruction">Allow Camera & Move Your Hand to Control! ✨</div>
    <div id="video_container"><video id="input_video"></video></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        let scene, camera, renderer, particleSystem;
        const particleCount = 5000;
        let particles = [];
        let handX = 0, handY = 0;
        let currentShape = 0;

        // ১. Three.js সেটআপ
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                posArray[i*3] = (Math.random() - 0.5) * 10;
                posArray[i*3+1] = (Math.random() - 0.5) * 10;
                posArray[i*3+2] = (Math.random() - 0.5) * 10;
                particles.push({ x: posArray[i*3], y: posArray[i*3+1], z: posArray[i*3+2] });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const material = new THREE.PointsMaterial({ size: 0.03, color: 0x00d2ff, transparent: true, blending: THREE.AdditiveBlending });
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            animate();
        }

        // ২. শেপ চেঞ্জ লজিক (হাত এক জায়গায় স্থির রাখলে বা ক্লিক করলে)
        function changeShape() {
            let nextPoints;
            if(currentShape === 0) nextPoints = getLayout("PRITY");
            else if(currentShape === 1) nextPoints = getLayout("BESTIE");
            else nextPoints = getCubeLayout();

            const pos = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                let target = nextPoints[i % nextPoints.length];
                new TWEEN.Tween(particles[i]).to({ x: target.x, y: target.y, z: target.z }, 1500).easing(TWEEN.Easing.Exponential.InOut).start();
            }
            currentShape = (currentShape + 1) % 3;
        }

        function getCubeLayout() {
            let pts = [];
            for (let i = 0; i < particleCount; i++) pts.push({ x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4, z: (Math.random()-0.5)*4 });
            return pts;
        }

        function getLayout(text) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 200;
            ctx.fillStyle = "white"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
            ctx.fillText(text, 200, 110);
            let data = ctx.getImageData(0,0,400,200).data;
            let targetPoints = [];
            for(let y=0; y<200; y+=3) {
                for(let x=0; x<400; x+=3) {
                    if(data[(y*400+x)*4+3] > 128) targetPoints.push({ x: (x-200)/30, y: -(y-100)/30, z: 0 });
                }
            }
            return targetPoints;
        }

        // ৩. হ্যান্ড ট্র্যাকিং লজিক
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                // Index Finger Tip (Landmark 8)
                handX = (landmarks[8].x - 0.5) * -10;
                handY = (landmarks[8].y - 0.5) * -10;
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            const pos = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++){
                let p = particles[i];
                // আঙুলের দিকে আকর্ষণ
                p.x += (handX - p.x) * 0.05;
                p.y += (handY - p.y) * 0.05;
                pos[i*3] = p.x; pos[i*3+1] = p.y; pos[i*3+2] = p.z;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('click', changeShape); // ক্লিক করলে নাম আসবে
        initThree();
    </script>
</body>
</html>
