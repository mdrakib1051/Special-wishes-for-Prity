<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Universe for Prity</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00d2ff; font-family: sans-serif; letter-spacing: 2px;
            font-size: 10px; pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="instruction">Move to attract • Click to change shape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        let scene, camera, renderer, particleSystem;
        const particleCount = 8000;
        let particles = [];
        let mouse = new THREE.Vector3(0, 0, 0);
        let currentShape = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                posArray[i*3] = (Math.random() - 0.5) * 15;
                posArray[i*3+1] = (Math.random() - 0.5) * 15;
                posArray[i*3+2] = (Math.random() - 0.5) * 15;
                
                particles.push({
                    x: posArray[i*3], y: posArray[i*3+1], z: posArray[i*3+2],
                    vx: 0, vy: 0, vz: 0
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const material = new THREE.PointsMaterial({
                size: 0.03, color: 0x00d2ff, transparent: true, blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchstart', onTouchMove);
            window.addEventListener('touchmove', onTouchMove);
            window.addEventListener('click', transitionNext);
            
            animate();
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(e) {
            mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        }

        function transitionNext() {
            let nextPoints;
            if(currentShape === 0) nextPoints = getSphereLayout();
            else if(currentShape === 1) nextPoints = getCubeLayout();
            else nextPoints = getNameLayout("PRITY");

            const pos = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                let target = nextPoints[i % nextPoints.length];
                new TWEEN.Tween(particles[i])
                    .to({ x: target.x, y: target.y, z: target.z }, 1500)
                    .easing(TWEEN.Easing.Cubic.InOut)
                    .start();
            }
            currentShape = (currentShape + 1) % 3;
        }

        function getCubeLayout() {
            let pts = [];
            for (let i = 0; i < particleCount; i++) {
                pts.push({ x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4, z: (Math.random()-0.5)*4 });
            }
            return pts;
        }

        function getSphereLayout() {
            let pts = [];
            for (let i = 0; i < particleCount; i++) {
                let phi = Math.acos(-1 + (2 * i) / particleCount);
                let theta = Math.sqrt(particleCount * Math.PI) * phi;
                pts.push({ x: 2.5 * Math.cos(theta) * Math.sin(phi), y: 2.5 * Math.sin(theta) * Math.sin(phi), z: 2.5 * Math.cos(phi) });
            }
            return pts;
        }

        function getNameLayout(text) {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 200;
            ctx.fillStyle = "white";
            ctx.font = "bold 70px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, 200, 110);
            let data = ctx.getImageData(0,0,400,200).data;
            let targetPoints = [];
            for(let y=0; y<200; y+=2) {
                for(let x=0; x<400; x+=2) {
                    if(data[(y*400+x)*4+3] > 128) targetPoints.push({ x: (x-200)/35, y: -(y-100)/35, z: 0 });
                }
            }
            return targetPoints;
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            const pos = particleSystem.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount; i++) {
                let p = particles[i];
                
                // মাউসের দিকে আকর্ষণ (Hand Follow)
                let dx = mouse.x * 5 - p.x;
                let dy = mouse.y * 5 - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < 2) {
                    p.vx += dx * 0.01;
                    p.vy += dy * 0.01;
                }

                p.vx *= 0.95; p.vy *= 0.95;
                p.x += p.vx; p.y += p.vy;

                pos[i*3] = p.x;
                pos[i*3+1] = p.y;
                pos[i*3+2] = p.z;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
